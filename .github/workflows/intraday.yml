name: Intraday Risk Check

on:
  schedule:
    # UTC schedules for completed 15-minute bars in China market sessions.
    - cron: '45 1 * * 1-5'
    - cron: '0,15,30,45 2 * * 1-5'
    - cron: '0,15,30 3 * * 1-5'
    - cron: '15,30,45 5 * * 1-5'
    - cron: '0,15,30,45 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: stock-sentinel-intraday
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  intraday-risk:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'false' }}
      EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER || 'resend' }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL || 'true' }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install intraday monitor
        run: pip install -e '.[intraday]'
      - name: Run scheduled check
        if: github.event_name == 'schedule'
        run: stock-sentinel intraday-risk
      - name: Run manual check
        if: github.event_name == 'workflow_dispatch'
        run: stock-sentinel intraday-risk --force
      - name: Commit intraday snapshot
        run: |
          if git diff --quiet -- data frontend/public/data; then
            echo "No intraday data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data frontend/public/data
          git commit -m "chore: update intraday risk snapshot"
          git push

# workflow registration refresh
